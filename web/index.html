<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sipwise C5 — RAG Assistent</title>
  <style>
    /* Schlichtes, sauberes Design – bewusst ohne externe Frameworks,
       damit alles offline und in EINER Datei funktioniert. */
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px; margin: 0 auto; padding: 24px;
      background: #f5f6f8; color: #1d2230;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 14px; margin-bottom: 20px; }
    .box { background: #fff; border-radius: 12px; padding: 16px;
           box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    textarea {
      width: 100%; min-height: 70px; padding: 12px; font-size: 16px;
      border: 1px solid #d1d5db; border-radius: 8px; resize: vertical;
      font-family: inherit;
    }
    button {
      margin-top: 10px; padding: 10px 20px; font-size: 16px;
      background: #2563eb; color: #fff; border: none; border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { background: #9ca3af; cursor: wait; }
    .mode {
      display: inline-flex; gap: 4px; padding: 4px; margin: 10px 0 0;
      background: #eef2ff; border-radius: 8px;
    }
    .mode label {
      padding: 7px 10px; border-radius: 6px; font-size: 14px; cursor: pointer;
      color: #374151;
    }
    .mode input { display: none; }
    .mode label:has(input:checked) { background: #2563eb; color: #fff; }
    /* white-space: pre-wrap sorgt dafür, dass die \n aus der Antwort als
       echte Zeilenumbrüche dargestellt werden – kein "Slash-Salat" mehr. */
    #answer { white-space: pre-wrap; line-height: 1.55; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
             color: #6b7280; margin-bottom: 8px; }
    .sources { margin-top: 16px; }
    .src { font-size: 13px; color: #374151; padding: 6px 10px;
           background: #eef2ff; border-radius: 6px; margin-bottom: 6px; }
    .fact { font-size: 13px; color: #374151; padding: 6px 10px;
            background: #ecfdf5; border-radius: 6px; margin-bottom: 6px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🔎 Sipwise C5 — RAG Assistent</h1>
  <div class="sub">Stelle eine Frage zur Sipwise-Dokumentation. Alles läuft lokal & offline.</div>

  <div class="box">
    <textarea id="question" placeholder="z. B. Was ist SIP-Peering? Erkläre es einfach."></textarea>
    <div class="mode" aria-label="Retrieval-Modus">
      <label><input type="radio" name="mode" value="vector" checked />Vector</label>
      <label><input type="radio" name="mode" value="graph" />GraphRAG</label>
    </div>
    <br />
    <button id="askBtn" onclick="ask()">Frage stellen</button>
  </div>

  <div id="result" class="box hidden">
    <div class="label">Antwort</div>
    <div id="answer"></div>
    <div class="sources">
      <div class="label">Quellen</div>
      <div id="sources"></div>
    </div>
    <div id="graphBox" class="sources hidden">
      <div class="label">Graph-Fakten</div>
      <div id="facts"></div>
    </div>
  </div>

  <script>
    async function ask() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const btn = document.getElementById('askBtn');
      const result = document.getElementById('result');
      const answerEl = document.getElementById('answer');
      const sourcesEl = document.getElementById('sources');
      const factsEl = document.getElementById('facts');
      const graphBox = document.getElementById('graphBox');
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const endpoint = mode === 'graph' ? '/query_graph' : '/query';

      // UI in "Lade"-Zustand versetzen.
      btn.disabled = true;
      btn.textContent = '… denke nach …';
      result.classList.remove('hidden');
      answerEl.textContent = 'Das lokale LLM arbeitet, einen Moment …';
      sourcesEl.replaceChildren();
      factsEl.replaceChildren();
      graphBox.classList.add('hidden');

      try {
        // Genau derselbe /query-Endpoint wie bei curl – nur dass der Browser
        // ihn für dich aufruft und die Antwort schön darstellt.
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');

        answerEl.textContent = data.answer;
        for (const s of data.sources) {
          const item = document.createElement('div');
          item.className = 'src';
          item.textContent = `📄 ${s.source} — Chunk ${s.chunk_index} (Distanz ${s.distance})`;
          sourcesEl.appendChild(item);
        }

        if (data.graph_facts && data.graph_facts.length) {
          graphBox.classList.remove('hidden');
          for (const f of data.graph_facts.slice(0, 8)) {
            const item = document.createElement('div');
            item.className = 'fact';
            const predicate = (f.predicate || '').replaceAll('_', ' ');
            item.textContent = `${f.subject} ${predicate} ${f.object}`;
            factsEl.appendChild(item);
          }
        }
      } catch (e) {
        answerEl.textContent = 'Fehler: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Frage stellen';
      }
    }

    // Komfort: Mit Cmd/Ctrl + Enter abschicken.
    document.getElementById('question').addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') ask();
    });
  </script>
</body>
</html>
